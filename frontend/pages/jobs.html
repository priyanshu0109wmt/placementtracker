<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs | PLCTR</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="jobs-page">
  <header class="site-header">
    <nav class="navbar container">
      <a class="brand" href="../index.html">PLCTR</a>
      <div class="nav-links">
        <a href="./student-dashboard.html">Student</a>
        <a href="./recruiter-dashboard.html">Recruiter</a>
        <a href="./login.html">Login</a>
      </div>
    </nav>
  </header>

  <main class="page-shell container">
    <section class="page-heading jobs-page-heading">
      <div>
        <p class="eyebrow">Placement Opportunities</p>
        <h1>Jobs</h1>
        <p>Browse current placement opportunities from recruiters.</p>
      </div>
      <a class="btn btn-secondary btn-small" href="./student-dashboard.html">My Applications</a>
    </section>

    <section class="jobs-filter-panel" aria-label="Job search and filters">
      <div class="jobs-filter-heading">
        <div>
          <p class="eyebrow">Discover</p>
          <h2>Search open roles</h2>
        </div>
        <p class="jobs-result-count" id="jobsResultCount">Loading jobs...</p>
      </div>

      <div class="jobs-filter-controls">
        <div class="job-search-field">
          <label for="jobSearchInput">Search jobs</label>
          <input
            id="jobSearchInput"
            type="search"
            placeholder="Search by title or company"
            autocomplete="off"
          >
        </div>

        <div class="job-filter-field">
          <label for="locationFilter">Location</label>
          <select id="locationFilter">
            <option value="">All locations</option>
          </select>
        </div>

        <div class="job-filter-field">
          <label for="jobTypeFilter">Job Type</label>
          <select id="jobTypeFilter">
            <option value="">All types</option>
          </select>
        </div>
      </div>
    </section>

    <div class="message" id="jobsMessage" role="status" aria-live="polite"></div>

    <section class="jobs-grid" id="jobsContainer">
      <article class="card loading-card">
        <span class="loader" aria-hidden="true"></span>
        <p>Loading jobs...</p>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <a class="brand" href="../index.html">PLCTR</a>
      <p>Discover placement opportunities from verified recruiters.</p>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/jobs.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
